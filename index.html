const GROUP_COLORS = {
  A:"#ef4444",B:"#f97316",C:"#eab308",D:"#22c55e",
  E:"#06b6d4",F:"#6366f1",G:"#ec4899",H:"#a855f7",

};

function formatDate(d) {
  return new Date(d+"T12:00:00").toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"});
}
function groupByDate(matches) {
  return matches.reduce((acc,m) => { (acc[m.date]=acc[m.date]||[]).push(m); return acc; }, {});
}
function calcPoints(pick, result) {
  if (!result || result.home==="" || result.away==="") return null;
  const ph=parseInt(pick.home), pa=parseInt(pick.away);
  const rh=parseInt(result.home), ra=parseInt(result.away);
  if (isNaN(ph)||isNaN(pa)) return null;
  if (ph===rh && pa===ra) return 3;
  const pr = ph>pa?"H":ph<pa?"A":"D", rr = rh>ra?"H":rh<ra?"A":"D";
  return pr===rr ? 1 : 0;
}

function MatchCard({ match, pick, result, onPickChange, isAdmin, onResultChange, showPoints, locked }) {

            {pts===3?"⭐ 3 pts":pts===1?"✓ 1 pt":"✗ 0 pts"}

      </div>

      <div style={{display:"flex",alignItems:"center",gap:8}}>

          <span style={{fontSize:22}}>{match.homeFlag}</span>
          <div style={{fontSize:12,color:"#cbd5e1",fontWeight:600,marginTop:2}}>{match.home}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,flexDirection:"column"}}>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <ScoreInput value={pick?.home??""} onChange={v=>onPickChange({...pick,home:v})} disabled={isLocked} />
            <span style={{color:"#475569",fontSize:20}}>-</span>
            <ScoreInput value={pick?.away??""} onChange={v=>onPickChange({...pick,away:v})} disabled={isLocked} />
          </div>
          <span style={{fontSize:10,color:isLocked?"#ef444480":"#475569"}}>
            {isLocked?"🔒 Bloqueado":"Tu predicción"}
          </span>
        </div>
        <div style={{flex:1,textAlign:"left"}}>
          <span style={{fontSize:22}}>{match.awayFlag}</span>
          <div style={{fontSize:12,color:"#cbd5e1",fontWeight:600,marginTop:2}}>{match.away}</div>

}

// ─── LEADERBOARD ───
function Leaderboard({ users, picks, results, onViewUser }) {
  const scores = Object.keys(users).map(u => {
    let pts=0,exactos=0,correctos=0;
    MATCHES.forEach(m => {
      const pick=picks[u]?.[m.id], result=results[m.id];
      if(!pick||!result) return;
      const p=calcPoints(pick,result);
      if(p===3){pts+=3;exactos++;correctos++;}
      else if(p===1){pts+=1;correctos++;}
    });
    return {user:u,name:users[u]?.name||u,pts,exactos,correctos};
  }).sort((a,b)=>b.pts-a.pts||b.exactos-a.exactos);

  const medals=["🥇","🥈","🥉"];
  return (
    <div style={{background:"#1e293b",borderRadius:16,overflow:"hidden",border:"1px solid #334155"}}>
      <div style={{background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",padding:"16px 20px"}}>
        <h2 style={{margin:0,color:"#fff",fontSize:18,fontWeight:700}}>🏆 Tabla General</h2>
      </div>
      {scores.length===0?(
        <div style={{padding:24,textAlign:"center",color:"#475569"}}>Aún no hay participantes.</div>
      ):(
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr style={{background:"#0f172a"}}>
              {["#","Jugador","Pts","⭐ Exactos","✓ Correctos"].map(h=>(
                <th key={h} style={{padding:"10px 8px",fontSize:11,color:"#64748b",
                  textAlign:"center",fontWeight:600,textTransform:"uppercase"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {scores.map((s,i)=>(
              <tr key={s.user} style={{borderTop:"1px solid #334155",background:i===0?"#1c1917":"transparent",cursor:"pointer"}}
                onClick={()=>onViewUser&&onViewUser(s.user)}>
                <td style={{padding:"12px 8px",textAlign:"center",fontSize:18}}>{medals[i]||i+1}</td>
                <td style={{padding:"12px 8px",fontWeight:600,color:"#f8fafc"}}>{s.name}</td>
                <td style={{padding:"12px 8px",textAlign:"center",fontWeight:800,fontSize:20,color:"#f59e0b"}}>{s.pts}</td>
                <td style={{padding:"12px 8px",textAlign:"center",color:"#22c55e"}}>{s.exactos}</td>
                <td style={{padding:"12px 8px",textAlign:"center",color:"#60a5fa"}}>{s.correctos}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
      <div style={{padding:"10px 20px",background:"#0f172a",fontSize:11,color:"#475569"}}>
        ⭐ Marcador exacto = 3 pts &nbsp;|&nbsp; ✓ Resultado correcto = 1 pt &nbsp;|&nbsp; Toca un nombre para ver su quiniela
      </div>
    </div>
  );
}

          🏆 Ver Tabla
        </button>
        <button onClick={()=>setView("admin_login")} style={{flex:1,padding:12,borderRadius:12,
          border:"1px solid #334155",background:"#1e293b",color:"#cbd5e1",fontSize:14,cursor:"pointer"}}>
          ⚙️ Admin
        </button>
      </div>
      {Object.keys(users).length>0&&(
        <p style={{color:"#475569",fontSize:13,marginTop:20}}>
          {Object.keys(users).length} participantes registrados
        </p>
      )}
    </div>
  );

  // ── ADMIN LOGIN ──
  if (view==="admin_login") return (
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",
      justifyContent:"center",padding:24,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{background:"#1e293b",borderRadius:20,padding:28,width:"100%",
        maxWidth:360,border:"1px solid #334155"}}>
        <button onClick={()=>setView("home")} style={{...S.btn,marginBottom:16}}>← Volver</button>
        <h2 style={{margin:"0 0 16px",color:"#f59e0b"}}>⚙️ Panel Admin</h2>
        <input type="password" value={adminPass} onChange={e=>setAdminPass(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleAdminLogin()}
          placeholder="Contraseña..."
          style={{width:"100%",padding:"12px 16px",borderRadius:12,border:"2px solid #334155",
            background:"#0f172a",color:"#f8fafc",fontSize:16,outline:"none",
            boxSizing:"border-box",marginBottom:12}}/>
        <button onClick={handleAdminLogin} style={{width:"100%",padding:14,borderRadius:12,border:"none",
          background:"#f59e0b",color:"#000",fontSize:16,fontWeight:700,cursor:"pointer"}}>
          Entrar
        </button>
        <p style={{color:"#475569",fontSize:12,marginTop:12,textAlign:"center"}}>
          Contraseña: <code style={{color:"#f59e0b"}}>{ADMIN_PASSWORD}</code>
        </p>
      </div>
    </div>
  );

  // ── LEADERBOARD ──
  if (view==="leaderboard") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={S.header}>
          <button onClick={()=>setView("home")} style={S.btn}>← Volver</button>
          <h1 style={{margin:0,color:"#f8fafc",fontSize:22,fontWeight:800}}>Tabla de Posiciones</h1>
        </div>
        <Leaderboard users={users} picks={picks} results={results}
          onViewUser={u=>{setViewingUser(u);setView("view_picks");}} />
      </div>
    </div>
  );

  // ── VIEW SOMEONE'S PICKS ──
  if (view==="view_picks"&&viewingUser) {
    const uName = users[viewingUser]?.name||viewingUser;
    return (
      <div style={S.page}>
        <div style={S.wrap}>
          <div style={S.header}>
            <button onClick={()=>setView("leaderboard")} style={S.btn}>← Tabla</button>
            <h1 style={{margin:0,color:"#f8fafc",fontSize:20,fontWeight:800}}>
              Quiniela de {uName}
            </h1>
          </div>
          <div style={S.tabs}>
            {dates.map(d=>(
              <button key={d} onClick={()=>setActiveDate(d)} style={{
                whiteSpace:"nowrap",padding:"8px 14px",borderRadius:20,border:"1px solid #334155",
                background:activeDate===d?"#1d4ed8":"#1e293b",
                color:activeDate===d?"#fff":"#94a3b8",cursor:"pointer",fontSize:12,fontWeight:600}}>
                {new Date(d+"T12:00:00").toLocaleDateString("es-MX",{day:"numeric",month:"short"})}
              </button>
            ))}
          </div>
          {activeDate&&grouped[activeDate].map(match=>(
            <div key={match.id} style={{marginBottom:12}}>
              <MatchCard match={match}
                pick={picks[viewingUser]?.[match.id]||{home:"",away:""}}
                result={results[match.id]||{home:"",away:""}}
                onPickChange={()=>{}} isAdmin={false} onResultChange={()=>{}}
                showPoints={true} locked={true}/>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── ADMIN VIEW ──
  if (view==="admin") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{...S.header,justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setView("home")} style={S.btn}>← Volver</button>
            <h1 style={{margin:0,color:"#f59e0b",fontSize:20,fontWeight:800}}>⚙️ Admin</h1>
          </div>
          <button onClick={saveResults} style={{background:"#f59e0b",border:"none",color:"#000",
            borderRadius:10,padding:"10px 18px",cursor:"pointer",fontWeight:700,fontSize:14}}>
            {saving?"Guardando...":"💾 Guardar resultados"}
          </button>
        </div>
        {saveMsg&&<div style={S.saveBar}>{saveMsg}</div>}
        <Leaderboard users={users} picks={picks} results={results}
          onViewUser={u=>{setViewingUser(u);setView("view_picks");}}/>
        <div style={{height:24}}/>
        <div style={S.tabs}>
          {dates.map(d=>(
            <button key={d} onClick={()=>setActiveDate(d)} style={{
              whiteSpace:"nowrap",padding:"8px 14px",borderRadius:20,border:"1px solid #334155",
              background:activeDate===d?"#1d4ed8":"#1e293b",
              color:activeDate===d?"#fff":"#94a3b8",cursor:"pointer",fontSize:12,fontWeight:600}}>
              {new Date(d+"T12:00:00").toLocaleDateString("es-MX",{day:"numeric",month:"short"})}
            </button>
          ))}
        </div>
        {activeDate&&grouped[activeDate].map(match=>(
          <div key={match.id} style={{marginBottom:12}}>
            <MatchCard match={match} pick={{home:"",away:""}}
              result={results[match.id]||{home:"",away:""}}
              onPickChange={()=>{}} isAdmin={true}
              onResultChange={val=>handleResultChange(match.id,val)}
              showPoints={false}/>
          </div>
        ))}
        <button onClick={saveResults} style={{width:"100%",padding:16,borderRadius:14,border:"none",
          background:"#f59e0b",color:"#000",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:8}}>
          💾 Guardar todos los resultados
        </button>
      </div>
    </div>
  );

  // ── QUINIELA ──
  return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{...S.header,justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setView("home")} style={S.btn}>←</button>
            <div>
              <div style={{color:"#94a3b8",fontSize:12}}>Tu quiniela</div>
              <div style={{color:"#f8fafc",fontWeight:800,fontSize:18}}>
                {users[currentUser]?.name||currentUser} ⚽
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setView("leaderboard")} style={S.btn}>🏆</button>
            <button onClick={saveMyPicks} style={{background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",
              border:"none",color:"#fff",borderRadius:10,padding:"10px 16px",
              cursor:"pointer",fontWeight:700,fontSize:14}}>
              {saving?"...":"💾 Guardar"}
            </button>
          </div>
        </div>

        {saveMsg&&<div style={S.saveBar}>{saveMsg}</div>}

        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[{c:"#16a34a",l:"⭐ Exacto = 3 pts"},{c:"#ca8a04",l:"✓ Resultado = 1 pt"}].map(x=>(
            <div key={x.l} style={{flex:1,background:"#1e293b",borderRadius:10,padding:"8px 12px",
              border:`1px solid ${x.c}30`,fontSize:12,color:x.c,textAlign:"center",fontWeight:600}}>{x.l}</div>
          ))}
        </div>

        <div style={S.tabs}>
          {dates.map(d=>(
            <button key={d} onClick={()=>setActiveDate(d)} style={{
              whiteSpace:"nowrap",padding:"8px 14px",borderRadius:20,border:"1px solid #334155",
              background:activeDate===d?"#1d4ed8":"#1e293b",
              color:activeDate===d?"#fff":"#94a3b8",cursor:"pointer",fontSize:12,fontWeight:600}}>
              {new Date(d+"T12:00:00").toLocaleDateString("es-MX",{day:"numeric",month:"short"})}
            </button>
          ))}
        </div>

        {activeDate&&(
          <>
            <h3 style={{margin:"0 0 12px",color:"#94a3b8",fontSize:14,textTransform:"capitalize"}}>
              {formatDate(activeDate)}
            </h3>
            {grouped[activeDate].map(match=>{
              const hasResult = results[match.id]&&results[match.id].home!=="";
              return (
                <div key={match.id} style={{marginBottom:12}}>
                  <MatchCard match={match}
                    pick={localPicks[match.id]||{home:"",away:""}}
                    result={results[match.id]||{home:"",away:""}}
                    onPickChange={val=>handlePickChange(match.id,val)}
                    isAdmin={false} onResultChange={()=>{}}
                    showPoints={true} locked={!!hasResult}/>
                </div>
              );
            })}
          </>
        )}

        <button onClick={saveMyPicks} style={{width:"100%",padding:16,borderRadius:14,border:"none",
          background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",color:"#fff",
          fontSize:16,fontWeight:700,cursor:"pointer",marginTop:8,marginBottom:32}}>
          💾 Guardar mi Quiniela
        </button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
