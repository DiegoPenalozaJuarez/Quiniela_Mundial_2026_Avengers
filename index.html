    table{width:100%;border-collapse:collapse}
    th{padding:10px 8px;font-size:11px;color:#64748b;text-align:center;font-weight:600;text-transform:uppercase;background:#0f172a}
    td{padding:12px 8px;text-align:center;border-top:1px solid #334155}
    .badge{border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;color:#fff}

    .badge-yellow{background:#ca8a04}
    .badge-red{background:#dc2626}

    .header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-top:8px}
    .match-teams{display:flex;align-items:center;gap:8px;margin:8px 0}
    .team{flex:1}
    .team.right{text-align:right}
    .team.left{text-align:left}
    .team-flag{font-size:22px;display:block}
    .team-name{font-size:12px;color:#cbd5e1;font-weight:600;margin-top:2px}
    .score-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
    .score-row{display:flex;gap:6px;align-items:center}
    .score-label{font-size:10px;color:#475569}
    .result-row{display:flex;align-items:center;justify-content:center;gap:8px;background:#0f172a;border-radius:10px;padding:6px 12px;margin-top:4px}
    .admin-result{display:flex;align-items:center;gap:8px;margin-top:4px;padding:8px 12px;background:#0f172a;border-radius:10px;border:1px dashed #f59e0b}

    .group-tag{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px}

  {id:19, date:"2026-06-17",time:"18:00",home:"Uruguay",      away:"Bélgica",        hf:"🇺🇾",af:"🇧🇪",group:"H",venue:"Arrowhead Stadium, Kansas City"},

  {id:25, date:"2026-07-05",time:"18:00",home:"Ganador P21",  away:"Ganador P22",    hf:"⚽",af:"⚽",group:"Cuartos",venue:"MetLife Stadium"},
  {id:26, date:"2026-07-06",time:"18:00",home:"Ganador P23",  away:"Ganador P24",    hf:"⚽",af:"⚽",group:"Cuartos",venue:"AT&T Stadium"},

  {id:30, date:"2026-07-19",time:"18:00",home:"Finalista 1",  away:"Finalista 2",    hf:"🏆",af:"🏆",group:"Final",venue:"MetLife Stadium, Nueva York"},

const GROUP_COLORS = {A:"#ef4444",B:"#f97316",C:"#eab308",D:"#22c55e",E:"#06b6d4",F:"#6366f1",G:"#ec4899",H:"#a855f7",Octavos:"#14b8a6",Cuartos:"#f59e0b",Semifinal:"#8b5cf6","3er Lugar":"#64748b",Final:"#f59e0b"};

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let state = {
  view: "home",       // home | quiniela | leaderboard | view_picks | admin | admin_login
  currentUser: null,  // uid key
  nameInput: "",
  adminPassInput: "",
  isAdmin: false,
  users: {},          // {uid: {name}}
  picks: {},          // {uid: {matchId: {h,a}}}
  results: {},        // {matchId: {h,a}}
  localPicks: {},     // unsaved picks for current user
  activeDate: null,
  viewingUser: null,
  saveMsg: "",
};

// ══════════════════════════════════════
// FIREBASE LISTENERS
// ══════════════════════════════════════
db.ref("users").on("value", snap => { state.users = snap.val() || {}; render(); });
db.ref("results").on("value", snap => { state.results = snap.val() || {}; render(); });
db.ref("picks").on("value", snap => {
  state.picks = snap.val() || {};
  if (state.currentUser) state.localPicks = Object.assign({}, state.picks[state.currentUser] || {});
  render();
});

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function calcPoints(pick, result) {
  if (!result || result.h === "" || result.h === undefined) return null;
  const ph = parseInt(pick.h), pa = parseInt(pick.a);
  const rh = parseInt(result.h), ra = parseInt(result.a);
  if (isNaN(ph) || isNaN(pa) || isNaN(rh) || isNaN(ra)) return null;
  if (ph === rh && pa === ra) return 3;
  const pr = ph > pa ? "H" : ph < pa ? "A" : "D";
  const rr = rh > ra ? "H" : rh < ra ? "A" : "D";
  return pr === rr ? 1 : 0;
}

function groupByDate(matches) {
  return matches.reduce((acc, m) => { (acc[m.date] = acc[m.date] || []).push(m); return acc; }, {});
}

function fmtDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("es-MX", {weekday:"long",day:"numeric",month:"long"});
}

function fmtTab(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("es-MX", {day:"numeric",month:"short"});
}

function showMsg(msg) {
  state.saveMsg = msg;
  render();
  setTimeout(() => { state.saveMsg = ""; render(); }, 2500);
}

function uid(name) {
  return name.trim().toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_áéíóúüñ]/g,"");
}

const grouped = groupByDate(MATCHES);
const dates = Object.keys(grouped).sort();

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render() {
  document.getElementById("app").innerHTML = buildView();
  attachEvents();
}

function buildView() {
  switch(state.view) {
    case "home":        return viewHome();
    case "quiniela":    return viewQuiniela();
    case "leaderboard": return viewLeaderboard();
    case "view_picks":  return viewUserPicks();
    case "admin":       return viewAdmin();
    case "admin_login": return viewAdminLogin();
    default:            return viewHome();
  }
}

// ══════════════════════════════════════
// MATCH CARD HTML
// ══════════════════════════════════════
function matchCard(match, pick, result, opts) {
  // opts: {editable, isAdmin, showPoints}
  const gc = GROUP_COLORS[match.group] || "#6366f1";
  const hasResult = result && result.h !== "" && result.h !== undefined;
  const locked = !opts.editable;
  const pts = (pick && result) ? calcPoints(pick, result) : null;
  const gLabel = match.group.length === 1 ? "Grupo " + match.group : match.group;

  let badgeHtml = "";
  if (opts.showPoints && pts !== null) {
    const cls = pts === 3 ? "badge-green" : pts === 1 ? "badge-yellow" : "badge-red";
    const txt = pts === 3 ? "⭐ 3 pts" : pts === 1 ? "✓ 1 pt" : "✗ 0 pts";
    badgeHtml = `<span class="badge ${cls}">${txt}</span>`;
  }

  const ph = pick ? (pick.h !== undefined ? pick.h : "") : "";
  const pa = pick ? (pick.a !== undefined ? pick.a : "") : "";
  const dis = locked ? "disabled" : "";

  let resultHtml = "";
  if (opts.isAdmin) {
    const rh = result ? (result.h !== undefined ? result.h : "") : "";
    const ra = result ? (result.a !== undefined ? result.a : "") : "";
    resultHtml = `<div class="admin-result">
      <span style="font-size:12px;color:#f59e0b;font-weight:600;flex:1">Resultado real:</span>
      <input class="score-input" type="number" min="0" max="20" value="${rh}" data-rid="${match.id}" data-side="h"/>
      <span style="color:#f59e0b">-</span>
      <input class="score-input" type="number" min="0" max="20" value="${ra}" data-rid="${match.id}" data-side="a"/>
    </div>`;
  } else if (hasResult) {
    resultHtml = `<div class="result-row">
      <span style="font-size:12px;color:#94a3b8">Resultado oficial:</span>
      <span style="font-weight:700;font-size:16px">${result.h} - ${result.a}</span>
    </div>`;
  }

  return `<div class="card" style="border-left:4px solid ${gc}">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="group-tag">${match.time} · ${gLabel}</span>
      ${badgeHtml}
    </div>
    <div class="match-teams">
      <div class="team right">
        <span class="team-flag">${match.hf}</span>
        <div class="team-name">${match.home}</div>
      </div>
      <div class="score-wrap">
        <div class="score-row">
          <input class="score-input" type="number" min="0" max="20" value="${ph}" ${dis} data-mid="${match.id}" data-side="h"/>
          <span style="color:#475569;font-size:20px">-</span>
          <input class="score-input" type="number" min="0" max="20" value="${pa}" ${dis} data-mid="${match.id}" data-side="a"/>
        </div>
        <span class="${locked ? "locked-label" : "score-label"}">${locked && !opts.isAdmin ? "🔒 Bloqueado" : "Tu predicción"}</span>
      </div>
      <div class="team left">
        <span class="team-flag">${match.af}</span>
        <div class="team-name">${match.away}</div>
      </div>
    </div>
    ${resultHtml}
    <div class="venue">📍 ${match.venue}</div>
  </div>`;
}

function dateTabs(activeDate) {
  return `<div class="tabs">${dates.map(d =>
    `<button class="tab${d === activeDate ? " active" : ""}" data-date="${d}">${fmtTab(d)}</button>`
  ).join("")}</div>`;
}

function leaderboardTable(onClickUser) {
  const scores = Object.keys(state.users).map(u => {
    let pts=0,ex=0,cor=0;
    MATCHES.forEach(m => {
      const pick = state.picks[u] && state.picks[u][m.id];
      const result = state.results[m.id];
      if (!pick || !result) return;
      const p = calcPoints(pick, result);
      if (p===3){pts+=3;ex++;cor++;}
      else if(p===1){pts+=1;cor++;}
    });
    return {uid:u, name:state.users[u].name||u, pts, ex, cor};
  }).sort((a,b) => b.pts-a.pts || b.ex-a.ex);

  const medals = ["🥇","🥈","🥉"];
  if (!scores.length) return `<div style="padding:24px;text-align:center;color:#475569">Aún no hay participantes.</div>`;

  return `<table>
    <thead><tr><th>#</th><th>Jugador</th><th>Pts</th><th>⭐ Exactos</th><th>✓ Correctos</th></tr></thead>
    <tbody>${scores.map((s,i) => `<tr style="cursor:pointer" data-viewuser="${s.uid}">
      <td style="font-size:18px">${medals[i]||i+1}</td>
      <td style="font-weight:600;text-align:left">${s.name}</td>
      <td style="font-weight:800;font-size:20px;color:#f59e0b">${s.pts}</td>
      <td style="color:#22c55e">${s.ex}</td>
      <td style="color:#60a5fa">${s.cor}</td>
    </tr>`).join("")}</tbody>
  </table>
  <div style="padding:10px 20px;background:#0f172a;font-size:11px;color:#475569">⭐ Exacto = 3 pts &nbsp;|&nbsp; ✓ Resultado = 1 pt &nbsp;|&nbsp; Toca un nombre para ver su quiniela</div>`;
}

  return `<div style="min-height:100vh;background:#0f172a;display:flex;align-items:center;justify-content:center;padding:24px">
    <div style="background:#1e293b;border-radius:20px;padding:28px;width:100%;max-width:360px;border:1px solid #334155">

  </div>`;

function viewLeaderboard() {
  return `<div class="page"><div class="wrap">
    <div class="header">
      <button class="btn" id="btnBack">← Volver</button>
      <h1 style="font-size:22px;font-weight:800">Tabla de Posiciones</h1>
    </div>
    <div style="background:#1e293b;border-radius:16px;overflow:hidden;border:1px solid #334155">
      <div style="background:linear-gradient(135deg,#1d4ed8,#7c3aed);padding:16px 20px">
        <h2 style="margin:0;color:#fff;font-size:18px;font-weight:700">🏆 Tabla General</h2>
      </div>
      ${leaderboardTable(true)}
    </div>
  </div></div>`;
}

function viewUserPicks() {
  const u = state.viewingUser;
  const name = state.users[u] ? state.users[u].name : u;
  const ad = state.activeDate || dates[0];
  const userPicks = state.picks[u] || {};
  return `<div class="page"><div class="wrap">
    <div class="header">
      <button class="btn" id="btnBack">← Tabla</button>
      <h1 style="font-size:20px;font-weight:800">Quiniela de ${name}</h1>
    </div>
    ${dateTabs(ad)}
    ${(grouped[ad]||[]).map(m => matchCard(m, userPicks[m.id]||{h:"",a:""}, state.results[m.id]||{}, {editable:false,isAdmin:false,showPoints:true})).join("")}
  </div></div>`;
}

function viewAdmin() {
  const ad = state.activeDate || dates[0];
  return `<div class="page"><div class="wrap">
    <div class="header" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn" id="btnBack">← Volver</button>
        <h1 style="font-size:20px;font-weight:800;color:#f59e0b">⚙️ Admin</h1>
      </div>
      <button class="btn-gold" id="btnSaveResults">💾 Guardar resultados</button>
    </div>
    ${state.saveMsg ? `<div class="save-msg">${state.saveMsg}</div>` : ""}
    <div style="background:#1e293b;border-radius:16px;overflow:hidden;border:1px solid #334155;margin-bottom:24px">
      <div style="background:linear-gradient(135deg,#1d4ed8,#7c3aed);padding:16px 20px">
        <h2 style="margin:0;color:#fff;font-size:18px;font-weight:700">🏆 Tabla General</h2>
      </div>
      ${leaderboardTable(true)}
    </div>
    ${dateTabs(ad)}
    ${(grouped[ad]||[]).map(m => matchCard(m, {}, state.results[m.id]||{}, {editable:false,isAdmin:true,showPoints:false})).join("")}
    <button class="btn-gold" id="btnSaveResults2" style="width:100%;padding:16px;border-radius:14px;font-size:16px;margin-top:8px;margin-bottom:32px">💾 Guardar todos los resultados</button>
  </div></div>`;
}

function viewQuiniela() {
  const ad = state.activeDate || dates[0];
  const uname = state.users[state.currentUser] ? state.users[state.currentUser].name : state.currentUser;
  return `<div class="page"><div class="wrap">
    <div class="header" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn" id="btnBack">←</button>
        <div>
          <div style="color:#94a3b8;font-size:12px">Tu quiniela</div>
          <div style="color:#f8fafc;font-weight:800;font-size:18px">${uname} ⚽</div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" id="btnGoLeaderboard">🏆</button>
        <button class="btn-gold" id="btnSavePicks">💾 Guardar</button>
      </div>
    </div>
    ${state.saveMsg ? `<div class="save-msg">${state.saveMsg}</div>` : ""}
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <div style="flex:1;background:#1e293b;border-radius:10px;padding:8px 12px;border:1px solid #16a34a30;font-size:12px;color:#16a34a;text-align:center;font-weight:600">⭐ Exacto = 3 pts</div>
      <div style="flex:1;background:#1e293b;border-radius:10px;padding:8px 12px;border:1px solid #ca8a0430;font-size:12px;color:#ca8a04;text-align:center;font-weight:600">✓ Resultado = 1 pt</div>
    </div>
    ${dateTabs(ad)}
    <h3 style="margin:0 0 12px;color:#94a3b8;font-size:14px;text-transform:capitalize">${fmtDate(ad)}</h3>
    ${(grouped[ad]||[]).map(m => {
      const hasResult = state.results[m.id] && state.results[m.id].h !== "" && state.results[m.id].h !== undefined;
      return matchCard(m, state.localPicks[m.id]||{h:"",a:""}, state.results[m.id]||{}, {editable:!hasResult,isAdmin:false,showPoints:true});
    }).join("")}
    <button class="btn-primary" id="btnSavePicks2" style="margin-top:8px;margin-bottom:32px">💾 Guardar mi Quiniela</button>
  </div></div>`;
}

// ══════════════════════════════════════
// EVENTS
// ══════════════════════════════════════
function attachEvents() {
  // Name input sync
  const ni = document.getElementById("nameInput");
  if (ni) ni.oninput = e => { state.nameInput = e.target.value; };

  // Admin pass sync
  const ai = document.getElementById("adminPassInput");
  if (ai) ai.oninput = e => { state.adminPassInput = e.target.value; };

  // Back button
  const bb = document.getElementById("btnBack");
  if (bb) bb.onclick = () => {
    if (state.view === "view_picks") { state.view = "leaderboard"; }
    else if (state.view === "admin") { state.view = "home"; state.isAdmin = false; }
    else { state.view = "home"; }
    render();
  };

  // Home buttons
  const be = document.getElementById("btnEnter");
  if (be) be.onclick = async () => {
    const name = state.nameInput.trim();
    if (!name) return;
    const key = uid(name);
    await db.ref("users/" + key).set({name});
    state.currentUser = key;
    state.localPicks = Object.assign({}, state.picks[key] || {});
    state.activeDate = dates[0];
    state.view = "quiniela";
    render();
  };

  const bl = document.getElementById("btnLeaderboard");
  if (bl) bl.onclick = () => { state.view = "leaderboard"; render(); };

  const bgl = document.getElementById("btnGoLeaderboard");
  if (bgl) bgl.onclick = () => { state.view = "leaderboard"; render(); };

  const bal = document.getElementById("btnAdminLogin");
  if (bal) bal.onclick = () => { state.view = "admin_login"; render(); };

  // Admin login
  const bae = document.getElementById("btnAdminEnter");
  if (bae) bae.onclick = () => {
    if (state.adminPassInput === ADMIN_PASSWORD) {
      state.isAdmin = true;
      state.activeDate = dates[0];
      state.view = "admin";
      render();
    } else {
      alert("Contraseña incorrecta");
    }
  };

  // Date tabs
  document.querySelectorAll(".tab[data-date]").forEach(btn => {
    btn.onclick = () => { state.activeDate = btn.dataset.date; render(); };
  });

  // Pick inputs
  document.querySelectorAll("input[data-mid]").forEach(inp => {
    inp.oninput = () => {
      const mid = inp.dataset.mid;
      const side = inp.dataset.side;
      if (!state.localPicks[mid]) state.localPicks[mid] = {h:"",a:""};
      state.localPicks[mid][side] = inp.value;
    };
  });

  // Result inputs (admin)
  document.querySelectorAll("input[data-rid]").forEach(inp => {
    inp.oninput = () => {
      const mid = inp.dataset.rid;
      const side = inp.dataset.side;
      if (!state.results[mid]) state.results[mid] = {h:"",a:""};
      state.results[mid][side] = inp.value;
    };
  });

  // Save picks
  ["btnSavePicks","btnSavePicks2"].forEach(id => {
    const b = document.getElementById(id);
    if (b) b.onclick = async () => {
      await db.ref("picks/" + state.currentUser).set(state.localPicks);
      showMsg("¡Quiniela guardada! ✅");
    };
  });

  // Save results
  ["btnSaveResults","btnSaveResults2"].forEach(id => {
    const b = document.getElementById(id);
    if (b) b.onclick = async () => {
      await db.ref("results").set(state.results);
      showMsg("Resultados guardados ✅");
    };
  });

  // View user picks from leaderboard
  document.querySelectorAll("tr[data-viewuser]").forEach(row => {
    row.onclick = () => {
      state.viewingUser = row.dataset.viewuser;
      state.activeDate = dates[0];
      state.view = "view_picks";
      render();
    };
  });
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
render();
</script>
</body>
</html>
